name: Bug report
description: Report something that is broken.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop GUI
        - Console UI
        - Candidate pool
        - Watched dataset
        - Posters
        - TMDb/KP/IMDb enrichment
        - Tests/CI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Do not paste API tokens, private watched data, or local runtime JSON.
      render: text
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13.x"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11"
